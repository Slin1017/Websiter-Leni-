<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Für Leni ❤️</title>
<style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .heart {
        position: relative;
        width: 300px;
        height: 300px;
        transform: rotate(-45deg);
        animation: pulse 1.5s infinite;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: red;
        border-radius: 50%;
        box-shadow: 0 0 30px red, 0 0 60px red;
    }

    .heart::before {
        top: -150px;
        left: 0;
    }

    .heart::after {
        left: 150px;
        top: 0;
    }

    .text {
        position: absolute;
        width: 100%;
        height: 100%;
        color: white;
        font-size: 18px;
        text-align: center;
        line-height: 300px;
        transform: rotate(45deg);
        text-shadow: 0 0 10px white, 0 0 20px pink, 0 0 40px red;
        animation: glow 2s infinite alternate;
    }

    @keyframes pulse {
        0% { transform: rotate(-45deg) scale(1); }
        50% { transform: rotate(-45deg) scale(1.1); }
        100% { transform: rotate(-45deg) scale(1); }
    }

    @keyframes glow {
        0% { text-shadow: 0 0 10px white, 0 0 20px pink, 0 0 40px red; }
        100% { text-shadow: 0 0 20px white, 0 0 40px pink, 0 0 80px red; }
    }
</style>
</head>
<body>

<div class="heart">
    <div class="text">ich liebe dich Leni</div>
</div>

</body>
</html>
